<script>
(()=>{ "use strict";
/* ---------- tokens ---------- */
const C={ink:'#14100c',asph:'#1a1613',walk:'#38322a',brick:'#8a3b2e',brickD:'#5a241b',mortar:'#6e2f24',cream:'#efe3ce',creamD:'#d9c8a8',brass:'#d99a3d',sodium:'#ffb65c',steel:'#5c6b73',steelD:'#3c474d',glass:'#26333a',glassL:'#31424b',wood:'#6d4a2f',woodD:'#523620',green:'#6fa36b',cold:'#9fc4d4',floor:'#4a4238',red:'#a33d2d',plant:'#3d5a46'};
const DISP=(s)=>`900 ${s}px "Arial Narrow","Helvetica Neue",Arial,sans-serif`;
const MONO=(s)=>`${s}px ui-monospace,Menlo,monospace`;
const RM=matchMedia('(prefers-reduced-motion: reduce)').matches;
const TOUCH=matchMedia('(pointer:coarse)').matches||'ontouchstart'in window;
let Z=1.4;                 /* camera zoom — real-scale on phones, tight on desktop */
const SCENE_ZOOM={street:.85,lobby:1,floor:1,roof:.95};
function calcZoom(){
 const s=Math.min(innerWidth,innerHeight);
 const base=(TOUCH&&s<=500)
   ?Math.min(1.9,Math.max(1.35,s/250))
   :Math.max(1.0,Math.min(1.55,Math.min(innerWidth/640,innerHeight/600)));
 Z=base*((typeof S!=='undefined'&&SCENE_ZOOM[S.scene])||1);
 if(typeof camLock!=='undefined'&&camLock)Z=Math.min(Z,innerWidth/520);  /* cutscene: keep all four desks in shot */
}
/* ---------- characters ---------- */

function drawPortrait(ctx,ch,w,h){ctx.clearRect(0,0,w,h);ctx.fillStyle='#171310';ctx.fillRect(0,0,w,h);
 ctx.strokeStyle='#3a332b';ctx.strokeRect(6,6,w-12,h-12);
 const cx=w/2,hy=h*.36,hr=w*.19;
 ctx.fillStyle='rgba(255,182,92,.06)';ctx.beginPath();ctx.arc(cx,hy+10,w*.42,0,TAU);ctx.fill();
 /* shoulders / suit */
 ctx.fillStyle=ch.suit;ctx.beginPath();ctx.moveTo(cx-w*.36*ch.w,h);ctx.quadraticCurveTo(cx-w*.34*ch.w,hy+hr*1.1,cx,hy+hr*.92);ctx.quadraticCurveTo(cx+w*.34*ch.w,hy+hr*1.1,cx+w*.36*ch.w,h);ctx.closePath();ctx.fill();
 if(ch.pin){ctx.strokeStyle='rgba(239,227,206,.14)';ctx.lineWidth=1;for(let i=-4;i<=4;i++){ctx.beginPath();ctx.moveTo(cx+i*9,hy+hr);ctx.lineTo(cx+i*11,h);ctx.stroke();}}
 /* shirt V + tie/chain */
 ctx.fillStyle=ch.shirt;ctx.beginPath();ctx.moveTo(cx-w*.09,hy+hr*.9);ctx.lineTo(cx,h*.72);ctx.lineTo(cx+w*.09,hy+hr*.9);ctx.closePath();ctx.fill();
 if(ch.tie){ctx.fillStyle=ch.tie;ctx.fillRect(cx-3,hy+hr*.95,6,h*.3);}
 if(ch.chain){ctx.strokeStyle=ch.chain;ctx.lineWidth=3;ctx.beginPath();ctx.arc(cx,hy+hr*1.05,w*.11,0.25,Math.PI-0.25);ctx.stroke();}
 /* head */
 ctx.fillStyle=ch.skin;ctx.beginPath();ctx.arc(cx,hy,hr,0,TAU);ctx.fill();
 /* hair styles */
 ctx.fillStyle=ch.hair;
 if(ch.style==='slick'){ctx.beginPath();ctx.arc(cx,hy-hr*.18,hr*1.02,Math.PI*1.05,Math.PI*1.95);ctx.fill();}
 if(ch.style==='grey'){ctx.beginPath();ctx.arc(cx,hy-hr*.14,hr*1.04,Math.PI*1.02,Math.PI*1.98);ctx.fill();}
 if(ch.style==='bob'){ctx.beginPath();ctx.arc(cx,hy-hr*.05,hr*1.12,Math.PI*.92,Math.PI*2.08);ctx.fill();ctx.fillRect(cx-hr*1.1,hy-hr*.1,hr*.34,hr*1.25);ctx.fillRect(cx+hr*.76,hy-hr*.1,hr*.34,hr*1.25);}
 if(ch.style==='cap'){ctx.beginPath();ctx.arc(cx,hy-hr*.24,hr*1.02,Math.PI,TAU);ctx.fill();ctx.fillRect(cx-hr*1.05,hy-hr*.3,hr*2.1,hr*.22);ctx.fillStyle='#3a2c1c';ctx.fillRect(cx-hr*1.25,hy-hr*.3,hr*.5,hr*.18);}
 if(ch.style==='fade'){ctx.beginPath();ctx.arc(cx,hy-hr*.3,hr*.98,Math.PI*1.04,Math.PI*1.96);ctx.fill();ctx.fillRect(cx-hr*.86,hy-hr*.66,hr*1.72,hr*.3);}
 if(ch.beard){ctx.strokeStyle=ch.hair;ctx.lineWidth=hr*.22;ctx.beginPath();ctx.arc(cx,hy+hr*.06,hr*.84,Math.PI*.2,Math.PI*.8);ctx.stroke();}
 /* face */
 if(ch.shades){ctx.fillStyle='#0c0c0c';ctx.fillRect(cx-hr*.78,hy-hr*.22,hr*1.56,hr*.34);ctx.fillRect(cx-hr*.1,hy-hr*.12,hr*.2,hr*.08);}
 else{ctx.fillStyle='#241c14';ctx.beginPath();ctx.arc(cx-hr*.38,hy-hr*.08,2.6,0,TAU);ctx.arc(cx+hr*.38,hy-hr*.08,2.6,0,TAU);ctx.fill();ctx.strokeStyle='#241c14';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx-hr*.58,hy-hr*.3);ctx.lineTo(cx-hr*.18,hy-hr*.34);ctx.moveTo(cx+hr*.18,hy-hr*.34);ctx.lineTo(cx+hr*.58,hy-hr*.3);ctx.stroke();}
 if(ch.glasses){ctx.strokeStyle='#171310';ctx.lineWidth=1.8;ctx.strokeRect(cx-hr*.64,hy-hr*.26,hr*.5,hr*.36);ctx.strokeRect(cx+hr*.14,hy-hr*.26,hr*.5,hr*.36);ctx.beginPath();ctx.moveTo(cx-hr*.14,hy-hr*.08);ctx.lineTo(cx+hr*.14,hy-hr*.08);ctx.stroke();}
 if(ch.stache){ctx.fillStyle=ch.hair;ctx.fillRect(cx-hr*.34,hy+hr*.3,hr*.68,hr*.14);}
 if(ch.lip){ctx.fillStyle=ch.lip;ctx.beginPath();ctx.ellipse(cx,hy+hr*.45,hr*.22,hr*.09,0,0,TAU);ctx.fill();}
 /* smoke accessory */
 const my=hy+hr*.42;
 if(ch.smoke==='cig'){ctx.fillStyle='#efe3ce';ctx.fillRect(cx+hr*.3,my,hr*.75,3.4);ctx.fillStyle='#e8622d';ctx.fillRect(cx+hr*1.02,my-.6,4,4.6);smokeCurl(ctx,cx+hr*1.06,my-6);}
 if(ch.smoke==='holder'){ctx.fillStyle='#151311';ctx.fillRect(cx+hr*.3,my,hr*1.05,2.6);ctx.fillStyle='#efe3ce';ctx.fillRect(cx+hr*1.3,my-1,hr*.3,4.4);ctx.fillStyle='#e8622d';ctx.fillRect(cx+hr*1.58,my-.6,3.6,4);smokeCurl(ctx,cx+hr*1.6,my-6);}
 if(ch.smoke==='cigar'){ctx.fillStyle='#4a2c18';ctx.fillRect(cx+hr*.3,my-1,hr*.7,6.4);ctx.fillStyle='#e8622d';ctx.fillRect(cx+hr*.98,my-1,4.6,6.4);ctx.fillStyle='#c9a86a';ctx.fillRect(cx+hr*.52,my-1,6,6.4);smokeCurl(ctx,cx+hr*1.02,my-7);}
}
function smokeCurl(ctx,x,y){ctx.strokeStyle='rgba(220,210,190,.4)';ctx.lineWidth=1.6;ctx.beginPath();ctx.moveTo(x,y);ctx.bezierCurveTo(x+6,y-10,x-6,y-18,x+3,y-30);ctx.stroke();ctx.strokeStyle='rgba(220,210,190,.18)';ctx.beginPath();ctx.moveTo(x+2,y-4);ctx.bezierCurveTo(x+10,y-16,x-2,y-26,x+8,y-40);ctx.stroke();}

 if(!grainPat)grainPat=g.createPattern(grain,'repeat');
 if(!RM){g.save();g.globalAlpha=.5;g.fillStyle=grainPat;g.translate((T*30)%160,0);g.fillRect(-160,0,W+320,H);g.restore();}
 if(vigCv)g.drawImage(vigCv,0,0);
 if(FIN.phase==='end'){g.fillStyle='rgba(0,0,0,'+Math.min(1,FIN.t/2.4).toFixed(3)+')';g.fillRect(0,0,W,H);}}
/* ---------- scene switching ---------- */
function setScene(id,x,y){S.scene=id;calcZoom();P.x=x;P.y=y;P.idleT=0;target=null;pendingAct=null;mutT=0;nextMut=3;mutMsg=null;SFX.door();S.visited[id]=1;const sc=SCN[id];locCard(sc.title[0],sc.title[1]);setObj(objective());
 if(id==='roof'&&AC&&!windNode){const b=AC.createBuffer(1,AC.sampleRate*2,AC.sampleRate),ch=b.getChannelData(0);for(let i=0;i<ch.length;i++)ch[i]=Math.random()*2-1;const src=AC.createBufferSource();src.buffer=b;src.loop=true;const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=420;const ga=AC.createGain();ga.gain.value=.05;src.connect(f);f.connect(ga);ga.connect(master);src.start();windNode={src,ga};}
 if(id!=='roof'&&windNode){windNode.src.stop();windNode=null;}}
/* ---------- input ---------- */
addEventListener('keydown',e=>{
 if($('boot')&&!ovlOpen&&(e.key==='Enter'||e.key===' ')){$('bootGo').click();return;}
 if(ovlOpen){if(e.key==='Escape'&&!ovl._keep){closeOvl();if(!S.picked){const b=$('boot');if(b)b.classList.remove('off');else selectOvl();}}if(ovl._keep&&!S.started&&['1','2','3','4'].includes(e.key))HQ.pick(+e.key-1);return;}
 if(cut){if(e.key==='Enter'||e.key.toLowerCase()==='e')cutSkip=true;return;}
 keys[e.key.toLowerCase()]=true;
 if(e.key==='e'||e.key==='E'||e.key==='Enter'){tryInteract();}
 if(['1','2','3'].includes(e.key)&&(S.scene==='street'||S.scene==='roof')){P.idle=['smoke','phone','lean'][+e.key-1];toast(['a cigarette. thinking it over.','checking the feed.','hands in pockets. let them wait.'][+e.key-1]);}
});
addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);
cv.addEventListener('pointerdown',e=>{if(cut){cutSkip=true;return;}if(FIN.on)return;if(ovlOpen)return;const r=cv.getBoundingClientRect();const wx=(e.clientX-r.left)/Z+cam.x,wy=(e.clientY-r.top)/Z+cam.y;
 const it=nearestInter(wx,wy);if(it&&dist(P.x,P.y,it.x,it.y)<it.r+10){target=null;pendingAct=null;runInter(it);return;}
 target={x:wx,y:wy};pendingAct=it||null;});
cv.addEventListener('pointermove',e=>{if(!e.buttons||ovlOpen||cut||FIN.on)return;const r=cv.getBoundingClientRect();target={x:(e.clientX-r.left)/Z+cam.x,y:(e.clientY-r.top)/Z+cam.y};pendingAct=null;});
function nearestInter(x,y,rad){let best=null,bd=1e9;for(const it of SCN[S.scene].inter){const d=dist(x,y,it.x,it.y);const lim=rad||Math.max(74,it.r+42);if(d<lim&&d<bd){bd=d;best=it;}}return best;}
function reachable(){let best=null,bd=1e9;for(const it of SCN[S.scene].inter){const d=dist(P.x,P.y,it.x,it.y);if(d<it.r&&d<bd){bd=d;best=it;}}return best;}
function runInter(it){if(cut)return;P.idle=null;mutT=0;nextMut=3;mutMsg=null;it.act();setObj(objective());carryTxt();}
function tryInteract(){const it=reachable();if(it)runInter(it);}
$('prompt').addEventListener('pointerdown',e=>{e.stopPropagation();tryInteract();});
$('musicB').addEventListener('click',()=>{S.music=!S.music;$('musicB').textContent=S.music?'♪ ON':'♪ OFF';ac();musGain.gain.linearRampToValueAtTime(S.music?.32:0,AC.currentTime+.2);});
$('expressB').addEventListener('click',()=>{if(cut||FIN.on)return;ac();SFX.click();mandateOvl(true);});
/* ---------- loop ---------- */
let last=performance.now(),T=0;
function frame(now){const dt=Math.min((now-last)/1000,.05);last=now;T+=dt;update(dt);render(dt,T);requestAnimationFrame(frame);}
function update(dt){const sc=SCN[S.scene];
 if(FIN.on)finUpdate(dt);
 if(!ovlOpen&&!cut){let vx=0,vy=0;
  if(keys['w']||keys['arrowup'])vy-=1;if(keys['s']||keys['arrowdown'])vy+=1;if(keys['a']||keys['arrowleft'])vx-=1;if(keys['d']||keys['arrowright'])vx+=1;
  if(vx||vy){target=null;P.idle=null;}
  if(target){
   if(pendingAct&&dist(P.x,P.y,pendingAct.x,pendingAct.y)<pendingAct.r+8){runInter(pendingAct);target=null;pendingAct=null;}
   else{const dx=target.x-P.x,dy=target.y-P.y,d=Math.hypot(dx,dy);if(d<8){if(pendingAct&&dist(P.x,P.y,pendingAct.x,pendingAct.y)<pendingAct.r+12)runInter(pendingAct);target=null;pendingAct=null;}else{vx=dx/d;vy=dy/d;P.idle=null;}}}
  const run=keys['shift']?1.55:1;const sp=228*run;
  if(vx||vy){const n=Math.hypot(vx,vy);vx/=n;vy/=n;P.a=Math.atan2(vy,vx);const nx=P.x+vx*sp*dt,ny=P.y+vy*sp*dt;
   const bx=collide(nx,P.y),by=collide(P.x,ny);
   if(!bx)P.x=nx;if(!by)P.y=ny;
   if(bx&&by){for(const da of[.7,-.7,1.2,-1.2]){const a2=Math.atan2(vy,vx)+da,tx2=P.x+Math.cos(a2)*sp*dt,ty2=P.y+Math.sin(a2)*sp*dt;if(!collide(tx2,ty2)){P.x=tx2;P.y=ty2;break;}}}
   P.x=Math.max(14,Math.min(sc.w-14,P.x));P.y=Math.max(14,Math.min(sc.h-14,P.y));P.moving=true;P.t+=dt*run;P.idleT=0;}
  else{P.moving=false;P.idleT+=dt;}
  /* footsteps + stuck-guard + idle mutter */
  const fmove=Math.hypot(P.x-(P._lx==null?P.x:P._lx),P.y-(P._ly==null?P.y:P._ly));
  if(P.moving&&fmove>0){P._stepA=(P._stepA||0)+fmove;if(P._stepA>34){P._stepA=0;SFX.step(fmove/Math.max(dt,.001)>250);}}
  if(target){if(fmove<0.5){P._stkT=(P._stkT||0)+dt;if(P._stkT>.5){target=null;pendingAct=null;P._stkT=0;}}else P._stkT=0;}else P._stkT=0;
  P._lx=P.x;P._ly=P.y;
  if(S.started&&!FIN.on){mutT+=dt;if(mutT>nextMut){mutT=0;nextMut=8+Math.random()*6;
   const line=(mutN++%2)?'uh? built to post right?':'uh? bot4x?';mutMsg={t:2,txt:line};speak(line,PC,.9);}}
  if(S.scene==='floor'&&!FIN.on){botB+=dt;if(botB>5.5){botB=0;if(Math.random()<.55)SFX.beep();}}
 }
 board.anim=Math.max(0,board.anim-dt*2.4);
 if(!FIN.on)updKicks(dt);
 /* the board breathes the slogan when idle */
 if(S.scene==='floor'&&!cut&&!FIN.on&&!ovlOpen){board.idle=(board.idle||0)+dt;
  if(board.idle>8){const b=board.text;
   if(b!=='BUILT TO'&&b!=='POST RIGHT.'){board.flipTo('BUILT TO');board.idle=6.9;}
   else if(b==='BUILT TO'){board.flipTo('POST RIGHT.');board.idle=5.4;}
   else{board.flipTo(S.gateDone?'PUBLISH':'JUDGING');board.idle=0;}}}
 const cw=W/Z,ch=H/Z;let fyc=camLock?camLock.y:P.y;
 if(!camLock&&S.scene==='street')fyc=Math.max(Math.min(fyc,P.y*.5+150),P.y-ch/2+60);   /* wall in frame, player never off-screen */
 const fx=(camLock?camLock.x:P.x)-cw/2,fy=fyc-ch/2;
 const tx=sc.w>cw?Math.max(0,Math.min(sc.w-cw,fx)):(sc.w-cw)/2;
 const ty=sc.h>ch?Math.max(0,Math.min(sc.h-ch,fy)):(sc.h-ch)/2;
 cam.x+=(tx-cam.x)*(RM?1:.12);cam.y+=(ty-cam.y)*(RM?1:.12);
 const it=(!ovlOpen&&!cut)?reachable():null;const pr=$('prompt');if(it){pr.style.display='block';$('promptT').textContent=it.label;}else pr.style.display='none';
 setObj(objective());}
function drawMarker(t){const k=objTargetKey();if(!k)return;const it=SCN[S.scene].inter.find(i=>i.key===k);if(!it)return;
 const pulse=1+Math.sin(t*4)*.08;g.strokeStyle='rgba(217,154,61,.85)';g.lineWidth=1.5;g.beginPath();g.arc(it.x,it.y,12*pulse,0,TAU);g.stroke();
 g.strokeStyle='rgba(217,154,61,.15)';g.lineWidth=1;g.beginPath();g.arc(it.x,it.y,19*pulse,0,TAU);g.stroke();
 const by=it.y-36+Math.sin(t*3)*3;g.fillStyle=C.brass;g.beginPath();g.moveTo(it.x,by+8);g.lineTo(it.x-5,by);g.lineTo(it.x+5,by);g.closePath();g.fill();}
function render(dt,t){g.fillStyle=C.ink;g.fillRect(0,0,W,H);
 if(FIN.on&&FIN.phase!=='smoke'){renderFinale(dt,t);return;}
 g.save();g.scale(Z,Z);g.translate(-cam.x,-cam.y);
 const sc=SCN[S.scene];sc.draw(dt,t);drawKicks(t);drawMarker(t);drawPlayer();drawParts(dt);
 if(mutMsg){mutMsg.t-=dt;if(mutMsg.t<=0)mutMsg=null;else{g.font=MONO(9);g.textAlign='center';const tw=g.measureText(mutMsg.txt).width+12;
  g.globalAlpha=Math.min(1,mutMsg.t/.4);g.fillStyle='rgba(15,13,10,.85)';g.fillRect(P.x-tw/2,P.y-60,tw,16);
  g.strokeStyle='rgba(217,154,61,.5)';g.strokeRect(P.x-tw/2,P.y-60,tw,16);
  g.fillStyle=C.cream;g.fillText(mutMsg.txt,P.x,P.y-48);g.globalAlpha=1;}}
 g.restore();
 if(!grainPat)grainPat=g.createPattern(grain,'repeat');if(!RM){g.save();g.globalAlpha=.5;g.fillStyle=grainPat;g.translate((T*30)%160,0);g.fillRect(-160,0,W+320,H);g.restore();}
 if(vigCv)g.drawImage(vigCv,0,0);
 drawMini(t);}
function drawMini(t){if(FIN.on){mg.clearRect(0,0,188,128);return;}const sc=SCN[S.scene];mg.clearRect(0,0,188,128);const k=Math.min(168/sc.w,96/sc.h),ox=(188-sc.w*k)/2,oy=8+(112-sc.h*k)/2;
 mg.fillStyle='#241f18';mg.fillRect(ox,oy,sc.w*k,sc.h*k);mg.strokeStyle='#3a332b';mg.strokeRect(ox,oy,sc.w*k,sc.h*k);
 mg.fillStyle='#3a332b';for(const r of sc.cols)mg.fillRect(ox+r.x*k,oy+r.y*k,Math.max(r.w*k,1),Math.max(r.h*k,1));
 for(const it of sc.inter){mg.fillStyle='#6f675c';mg.fillRect(ox+it.x*k-1.5,oy+it.y*k-1.5,3,3);}
 const tk=objTargetKey();if(tk){const it=sc.inter.find(i=>i.key===tk);if(it){const pl=1+Math.sin(t*4)*.5;mg.strokeStyle='#d99a3d';mg.lineWidth=1.5;mg.beginPath();mg.arc(ox+it.x*k,oy+it.y*k,4.5*pl,0,TAU);mg.stroke();mg.fillStyle='#d99a3d';mg.beginPath();mg.arc(ox+it.x*k,oy+it.y*k,2,0,TAU);mg.fill();}}
 mg.fillStyle=S.signed?'#6fa36b':'#efe3ce';mg.beginPath();mg.arc(ox+P.x*k,oy+P.y*k,3,0,TAU);mg.fill();
 mg.font=((W<=640||H<=500)?'11px':'8px')+' ui-monospace,Menlo';mg.fillStyle='#6f675c';mg.textAlign='left';mg.fillText(S.scene.toUpperCase()+' · ● = NEXT',ox+2,oy-3);}
if(TOUCH)$('hint').textContent='TAP TO WALK · TAP THINGS TO USE · ♪ MUTES';
if(innerWidth<=640)$('expressB').textContent='CONTRACTS →';
document.addEventListener('click',e=>{if(e.target.closest&&e.target.closest('button'))SFX.click();},true);
setScene('street',190,660);carryTxt();bootInit();requestAnimationFrame(frame);
})();
