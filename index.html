<script>
(()=>{ "use strict";
/* ---------- tokens ---------- */
const C={ink:'#14100c',asph:'#1a1613',walk:'#38322a',walk2:'#403930',brick:'#8a3b2e',brickD:'#5a241b',brickL:'#9c4e3d',mortar:'#6e2f24',cream:'#efe3ce',creamD:'#d9c8a8',brass:'#d99a3d',sodium:'#ffb65c',steel:'#5c6b73',steelD:'#3c474d',glass:'#26333a',glassL:'#31424b',wood:'#6d4a2f',woodD:'#523620',green:'#6fa36b',cold:'#9fc4d4',floor:'#4a4238',floor2:'#514840',red:'#a33d2d'};
const DISP=(s)=>`900 ${s}px "Arial Narrow","Helvetica Neue",Arial,sans-serif`;
const UI=(s,w)=>`${w||600} ${s}px "Helvetica Neue",Arial,sans-serif`;

const RM=matchMedia('(prefers-reduced-motion: reduce)').matches;
/* ---------- state ---------- */
const S={scene:'street',name:'',handle:'',email:'',carrying:null,checkedIn:false,gateDone:false,signed:false,music:true,started:false,visited:{}};
const P={x:260,y:660,a:Math.PI/2,spd:0,idle:null,t:0,moving:false};
let cam={x:0,y:0},camLock=null,cut=false,cutSkip=false,target=null,pendingAct=null;
const keys={};
/* ---------- dom ---------- */
const cv=document.getElementById('cv'),g=cv.getContext('2d');
const mini=document.getElementById('mini'),mg=mini.getContext('2d');
const $=(id)=>document.getElementById(id);
let W=innerWidth,H=innerHeight,DPRv=Math.min(devicePixelRatio||1,2);
function resize(){W=innerWidth;H=innerHeight;DPRv=Math.min(devicePixelRatio||1,2);cv.width=W*DPRv;cv.height=H*DPRv;g.setTransform(DPRv,0,0,DPRv,0,0);}
addEventListener('resize',resize);resize();
/* grain */
const grain=document.createElement('canvas');grain.width=grain.height=160;{const gg=grain.getContext('2d'),d=gg.createImageData(160,160);for(let i=0;i<d.data.length;i+=4){const v=Math.random()*255|0;d.data[i]=d.data[i+1]=d.data[i+2]=v;d.data[i+3]=14;}gg.putImageData(d,0,0);}
let grainPat=null;
/* ---------- audio ---------- */
let AC=null,master=null,musGain=null,windNode=null;
function ac(){if(AC)return AC;AC=new (window.AudioContext||window.webkitAudioContext)();const comp=AC.createDynamicsCompressor();master=AC.createGain();master.gain.value=.9;master.connect(comp);comp.connect(AC.destination);musGain=AC.createGain();musGain.gain.value=S.music?.34:0;musGain.connect(master);startMusic();return AC;}
function env(node,t0,a,d,peak){node.gain.setValueAtTime(0,t0);node.gain.linearRampToValueAtTime(peak,t0+a);node.gain.exponentialRampToValueAtTime(.0001,t0+a+d);}
function osc(type,f0,t0,a,d,peak,f1,out){const o=AC.createOscillator(),ga=AC.createGain();o.type=type;o.frequency.setValueAtTime(f0,t0);if(f1)o.frequency.exponentialRampToValueAtTime(f1,t0+a+d);env(ga,t0,a,d,peak);o.connect(ga);ga.connect(out||master);o.start(t0);o.stop(t0+a+d+.05);}
function noise(t0,a,d,peak,fType,fq,out){const b=AC.createBuffer(1,AC.sampleRate*(a+d+.05),AC.sampleRate),ch=b.getChannelData(0);for(let i=0;i<ch.length;i++)ch[i]=Math.random()*2-1;const src=AC.createBufferSource();src.buffer=b;const f=AC.createBiquadFilter();f.type=fType||'bandpass';f.frequency.value=fq||3000;const ga=AC.createGain();env(ga,t0,a,d,peak);src.connect(f);f.connect(ga);ga.connect(out||master);src.start(t0);}
const SFX={
 buzz(){if(!AC)return;const t=AC.currentTime;osc('square',110,t,.01,.22,.12);noise(t,.01,.2,.05,'bandpass',900);},
 ding(){if(!AC)return;const t=AC.currentTime;osc('sine',740,t,.005,.6,.12);osc('sine',1108,t+.03,.005,.7,.09);},
 print(){if(!AC)return;const t=AC.currentTime;for(let i=0;i<7;i++)noise(t+i*.05,.004,.03,.06,'highpass',4000);},
 type(){if(!AC)return;noise(AC.currentTime,.002,.03,.08,'highpass',3000);},
 thunk(){if(!AC)return;const t=AC.currentTime;osc('sine',120,t,.005,.16,.3,55);noise(t,.002,.05,.09,'lowpass',800);},
 flap(){if(!AC)return;const t=AC.currentTime;for(let i=0;i<9;i++)noise(t+i*.028,.002,.02,.05,'highpass',2500);},
 pen(){if(!AC)return;noise(AC.currentTime,.02,.5,.05,'bandpass',1800);},
 rattle(){if(!AC)return;const t=AC.currentTime;for(let i=0;i<4;i++)noise(t+i*.07,.004,.05,.09,'bandpass',600);},
 purr(){if(!AC)return;const t=AC.currentTime;for(let i=0;i<6;i++)noise(t+i*.11,.03,.08,.05,'lowpass',300);}
};
/* money-gang loop: 87bpm half-time, D minor */
const MUS={next:0,step:0};
function startMusic(){if(!AC)return;MUS.next=AC.currentTime+.1;MUS.step=0;tickMusic();}
function tickMusic(){if(!AC)return;const sd=60/87/4;while(MUS.next<AC.currentTime+.14){schedStep(MUS.step%32,MUS.next,sd);MUS.step++;MUS.next+=sd;}setTimeout(tickMusic,25);}
function kick(t){osc('sine',150,t,.004,.34,.5,42,musGain);}
function snare(t){noise(t,.002,.18,.24,'bandpass',1800,musGain);osc('triangle',190,t,.002,.09,.1,120,musGain);}
function hat(t,v){noise(t,.001,.035,v,'highpass',7800,musGain);}
function bass(t,f,len){const o=AC.createOscillator(),ga=AC.createGain(),sh=AC.createWaveShaper();const curve=new Float32Array(64);for(let i=0;i<64;i++){const x=i/32-1;curve[i]=Math.tanh(2.2*x);}sh.curve=curve;o.type='sine';o.frequency.setValueAtTime(f,t);ga.gain.setValueAtTime(0,t);ga.gain.linearRampToValueAtTime(.42,t+.012);ga.gain.exponentialRampToValueAtTime(.0001,t+len);o.connect(sh);sh.connect(ga);ga.connect(musGain);o.start(t);o.stop(t+len+.05);}
function keysStab(t){const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=850;const ga=AC.createGain();ga.gain.setValueAtTime(0,t);ga.gain.linearRampToValueAtTime(.055,t+.02);ga.gain.exponentialRampToValueAtTime(.0001,t+.65);f.connect(ga);ga.connect(musGain);[146.83,174.61,220,261.63].forEach(fr=>{[0,1.7].forEach(dt=>{const o=AC.createOscillator();o.type='sawtooth';o.frequency.value=fr*(1+dt*.0012);o.connect(f);o.start(t);o.stop(t+.7);});});}
function schedStep(s,t,sd){if([0,7,16,22].includes(s))kick(t);if(s===8||s===24)snare(t);if(s%2===0)hat(t,s%8===0?.16:.09);if(s===30){hat(t,.12);hat(t+sd/3,.1);hat(t+2*sd/3,.09);}
 const bp={0:[36.71,.9],7:[43.65,.5],16:[36.71,.9],22:[32.70,.45],27:[49.00,.7]}[s];if(bp)bass(t,bp[0],bp[1]);
 if(s===0&&(MUS.step/32|0)%2===0)keysStab(t);}
/* ---------- helpers ---------- */
const TAU=Math.PI*2;const dist=(a,b,c,d)=>Math.hypot(a-c,b-d);
function rr(x,y,w,h,r){g.beginPath();g.moveTo(x+r,y);g.arcTo(x+w,y,x+w,y+h,r);g.arcTo(x+w,y+h,x,y+h,r);g.arcTo(x,y+h,x,y,r);g.arcTo(x,y,x+w,y,r);g.closePath();}
function brickFill(x,y,w,h,base,dark){g.fillStyle=base;g.fillRect(x,y,w,h);g.strokeStyle=dark;g.lineWidth=1;g.beginPath();for(let yy=y;yy<y+h;yy+=16){g.moveTo(x,yy);g.lineTo(x+w,yy);}for(let r=0;r<h/16;r++){const off=(r%2)*22;for(let xx=x+off;xx<x+w;xx+=44){g.moveTo(xx,y+r*16);g.lineTo(xx,Math.min(y+r*16+16,y+h));}}g.stroke();}
function winPane(x,y,w,h,lit,arch){g.fillStyle=lit?'#e8b562':C.glass;if(arch){g.beginPath();g.moveTo(x,y+h);g.lineTo(x,y+18);g.quadraticCurveTo(x+w/2,y-14,x+w,y+18);g.lineTo(x+w,y+h);g.closePath();g.fill();}else g.fillRect(x,y,w,h);g.strokeStyle=lit?'#8a5a1e':C.steelD;g.lineWidth=2;const cols=3,rows=3;for(let i=1;i<cols;i++){g.beginPath();g.moveTo(x+w*i/cols,y+(arch?4:0));g.lineTo(x+w*i/cols,y+h);g.stroke();}for(let i=1;i<rows;i++){g.beginPath();g.moveTo(x,y+h*i/rows);g.lineTo(x+w,y+h*i/rows);g.stroke();}g.strokeStyle=C.steelD;if(arch){g.beginPath();g.moveTo(x,y+h);g.lineTo(x,y+18);g.quadraticCurveTo(x+w/2,y-14,x+w,y+18);g.lineTo(x+w,y+h);g.stroke();}else g.strokeRect(x,y,w,h);}

function gateCut(){if(cut)return;cut=true;cutSkip=false;target=null;const sc=SCN.floor;ac();
 camLock={x:1200,y:760};board.flipTo('JUDGING');
 const steps=[
  [0.9,()=>{sc.flash='VOICE';SFX.thunk();sc.chip={t:'VOICE 8/10 — register: yours',x:1000,y:620};}],
  [1.7,()=>{sc.flash='PROOF';SFX.thunk();sc.chip={t:'PROOF 2/10 — unsourced claim',x:1400,y:620};}],
  [2.5,()=>{sc.flash='VALUE';SFX.thunk();sc.chip={t:'VALUE 7/10',x:1000,y:988};}],
  [3.3,()=>{sc.flash='CONTRACT';SFX.thunk();sc.chip={t:'CONTRACT ok — one point',x:1400,y:988};}],
  [4.1,()=>{sc.flash=null;sc.chip=null;board.flipTo('REWRITE');toast('“I wouldn’t put the first version under your name.” — the Gate');}],
  [5.0,()=>{let i=0;const iv=setInterval(()=>{SFX.type();if(++i>6)clearInterval(iv);},80);sc.chip={t:'…cutting the unbacked number, keeping the take…',x:1200,y:660};}],
  [6.2,()=>{sc.chip=null;board.flipTo('SECOND PASS');}],
  [6.8,()=>{SFX.thunk();}],[7.05,()=>{SFX.thunk();}],[7.3,()=>{SFX.thunk();}],[7.55,()=>{SFX.thunk();}],
  [8.1,()=>{board.flipTo('PUBLISH');SFX.ding();toast('Bold on take. Strict on claim.',true);}],
  [8.9,()=>{S.carrying='shipped';S.gateDone=true;carryTxt();camLock=null;cut=false;}]];
 const t0=performance.now();let done=0;
 (function run(){if(cutSkip){for(let i=done;i<steps.length;i++)steps[i][1]();done=steps.length;return;}
  const el=(performance.now()-t0)/1000*(RM?2.2:1);while(done<steps.length&&steps[done][0]<=el){steps[done][1]();done++;}
  if(done<steps.length)requestAnimationFrame(run);})();}
/* ---------- scene switching ---------- */
function setScene(id,x,y){S.scene=id;P.x=x;P.y=y;target=null;pendingAct=null;S.visited[id]=1;const sc=SCN[id];locCard(sc.title[0],sc.title[1]);setObj(objective());
 if(id==='roof'&&AC&&!windNode){const b=AC.createBuffer(1,AC.sampleRate*2,AC.sampleRate),ch=b.getChannelData(0);for(let i=0;i<ch.length;i++)ch[i]=Math.random()*2-1;const src=AC.createBufferSource();src.buffer=b;src.loop=true;const f=AC.createBiquadFilter();f.type='lowpass';f.frequency.value=420;const ga=AC.createGain();ga.gain.value=.05;src.connect(f);f.connect(ga);ga.connect(master);src.start();windNode={src,ga};}
 if(id!=='roof'&&windNode){windNode.src.stop();windNode=null;}}
/* ---------- input ---------- */
addEventListener('keydown',e=>{if(ovlOpen){if(e.key==='Escape')closeOvl();return;}
 if(cut){if(e.key==='Enter'||e.key.toLowerCase()==='e')cutSkip=true;return;}
 keys[e.key.toLowerCase()]=true;S.started||start();
 if(e.key==='e'||e.key==='E'||e.key==='Enter'){tryInteract();}
 if(['1','2','3'].includes(e.key)&&(S.scene==='street'||S.scene==='roof')){P.idle=['smoke','phone','lean'][+e.key-1];toast(['a cigarette. thinking it over.','checking the feed.','hands in pockets. let them wait.'][+e.key-1]);}
});

 const it=nearestInter(wx,wy,60);if(it&&dist(P.x,P.y,it.x,it.y)<it.r+8){runInter(it);return;}
 target={x:wx,y:wy};pendingAct=it||null;});
function nearestInter(x,y,rad){let best=null,bd=1e9;for(const it of SCN[S.scene].inter){const d=dist(x,y,it.x,it.y);if(d<(rad||it.r)&&d<bd){bd=d;best=it;}}return best;}
function reachable(){let best=null,bd=1e9;for(const it of SCN[S.scene].inter){const d=dist(P.x,P.y,it.x,it.y);if(d<it.r&&d<bd){bd=d;best=it;}}return best;}
function runInter(it){if(cut)return;P.idle=null;it.act();setObj(objective());carryTxt();}
function tryInteract(){const it=reachable();if(it)runInter(it);}
function start(){S.started=true;ac();}
$('musicB').addEventListener('click',()=>{S.music=!S.music;$('musicB').textContent=S.music?'♪ ON':'♪ OFF';ac();musGain.gain.linearRampToValueAtTime(S.music?.34:0,AC.currentTime+.2);});
$('expressB').addEventListener('click',()=>{S.started||start();mandateOvl(true);});
/* ---------- loop ---------- */
let last=performance.now(),T=0;
function frame(now){const dt=Math.min((now-last)/1000,.05);last=now;T+=dt;update(dt);render(dt,T);requestAnimationFrame(frame);}
function update(dt){const sc=SCN[S.scene];
 if(!ovlOpen&&!cut){let vx=0,vy=0;
  if(keys['w']||keys['arrowup'])vy-=1;if(keys['s']||keys['arrowdown'])vy+=1;if(keys['a']||keys['arrowleft'])vx-=1;if(keys['d']||keys['arrowright'])vx+=1;
  if(vx||vy){target=null;P.idle=null;}
  if(target){const dx=target.x-P.x,dy=target.y-P.y,d=Math.hypot(dx,dy);if(d<8){if(pendingAct&&dist(P.x,P.y,pendingAct.x,pendingAct.y)<pendingAct.r+10)runInter(pendingAct);target=null;pendingAct=null;}else{vx=dx/d;vy=dy/d;P.idle=null;}}
  const run=keys['shift']?1.55:1;const sp=228*run;
  if(vx||vy){const n=Math.hypot(vx,vy);vx/=n;vy/=n;P.a=Math.atan2(vy,vx);const nx=P.x+vx*sp*dt,ny=P.y+vy*sp*dt;
   if(!collide(nx,P.y))P.x=nx;if(!collide(P.x,ny))P.y=ny;
   P.x=Math.max(14,Math.min(sc.w-14,P.x));P.y=Math.max(14,Math.min(sc.h-14,P.y));P.moving=true;P.t+=dt*run;}else P.moving=false;
 }
 board.anim=Math.max(0,board.anim-dt*2.4);
 const cw=W,ch=H;const tx=(camLock?camLock.x:P.x)-cw/2,ty=(camLock?camLock.y:P.y)-ch/2;
 cam.x+=(Math.max(0,Math.min(sc.w-cw,tx))-cam.x)*(RM?1:.12);cam.y+=(Math.max(0,Math.min(sc.h-ch,ty))-cam.y)*(RM?1:.12);
 const it=(!ovlOpen&&!cut)?reachable():null;const pr=$('prompt');if(it){pr.style.display='block';$('promptT').textContent=it.label;}else pr.style.display='none';
 setObj(objective());}
function render(dt,t){g.fillStyle=C.ink;g.fillRect(0,0,W,H);g.save();g.translate(-cam.x,-cam.y);
 const sc=SCN[S.scene];sc.draw(dt,t);drawPlayer();drawParts(dt);
 g.restore();
 if(!grainPat)grainPat=g.createPattern(grain,'repeat');if(!RM){g.save();g.globalAlpha=.5;g.fillStyle=grainPat;g.translate((T*30)%160,0);g.fillRect(-160,0,W+320,H);g.restore();}
 const vg=g.createRadialGradient(W/2,H/2,Math.min(W,H)*.36,W/2,H/2,Math.max(W,H)*.72);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(8,6,4,.5)');g.fillStyle=vg;g.fillRect(0,0,W,H);
 drawMini();}
function drawMini(){const sc=SCN[S.scene];mg.clearRect(0,0,188,128);mg.fillStyle='rgba(16,13,10,.0)';const k=Math.min(168/sc.w,102/sc.h),ox=(188-sc.w*k)/2,oy=(128-sc.h*k)/2;
 mg.fillStyle='#241f18';mg.fillRect(ox,oy,sc.w*k,sc.h*k);mg.strokeStyle='#3a332b';mg.strokeRect(ox,oy,sc.w*k,sc.h*k);
 mg.fillStyle='#3a332b';for(const r of sc.cols)mg.fillRect(ox+r.x*k,oy+r.y*k,Math.max(r.w*k,1),Math.max(r.h*k,1));
 for(const it of sc.inter){mg.fillStyle='#d99a3d';mg.fillRect(ox+it.x*k-1.5,oy+it.y*k-1.5,3,3);}
 mg.fillStyle=S.signed?'#6fa36b':'#efe3ce';mg.beginPath();mg.arc(ox+P.x*k,oy+P.y*k,3,0,TAU);mg.fill();
 mg.font='8px ui-monospace,Menlo';mg.fillStyle='#6f675c';mg.textAlign='left';mg.fillText(S.scene.toUpperCase(),ox+4,oy+11);}
setScene('street',260,660);carryTxt();requestAnimationFrame(frame);
})();
